name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # Genera el colibrí configurando el parámetro 'svg_style' o 'outputs'
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: Viqui-Alaro
          # Definimos el estilo para que use el icono del colibrí
          # 'snake_color' y 'svg_style' permiten personalizar el dibujo
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=purple&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
            dist/github-contribution-grid-snake.gif?palette=github-dark&color_snake=purple&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
